<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Qna Bot</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    :root {
      --min-vh: min(100vh, min(100dvh, 100svh));
    }

    body {
      background-color: #f3f4f6;
      font-family: sans-serif;
      max-height: var(--min-vh) !important;
    }

    .chat-container {
      height: calc(var(--min-vh) - 160px);
    }

    .message {
      max-width: 85%;
      margin-bottom: 1rem;
      padding: 0.75rem 1rem;
      border-radius: 1rem;
      position: relative;
    }

    .user-msg {
      background-color: #3b82f6;
      color: white;
      align-self: flex-end;
      border-bottom-right-radius: 0;
    }

    .bot-msg {
      background-color: white;
      color: #1f2937;
      align-self: flex-start;
      border-bottom-left-radius: 0;
      border: 1px solid #e5e7eb;
    }

    .loading-dots::after {
      content: '.';
      animation: dots 1.5s steps(5, end) infinite;
    }

    @keyframes dots {

      0%,
      20% {
        content: '.';
      }

      40% {
        content: '..';
      }

      60% {
        content: '...';
      }
    }

  </style>
</head>

<body class="flex flex-col h-screen">

  <header class="bg-white border-b p-4 shadow-sm">
    <div class="max-w-4xl mx-auto flex justify-between items-center">
      <div>
        <h1 class="text-xl font-bold text-gray-800">Qna Bot</h1>
        <p id="status" class="text-xs text-orange-500 font-medium">Initializing Model...</p>
      </div>
      <div class="flex items-center gap-2">
        <div id="activity-indicator" class="w-2 h-2 rounded-full bg-gray-300"></div>
        <span class="text-[10px] uppercase text-gray-400"></span>
      </div>
    </div>
  </header>

  <main id="chat-window" class="flex-1 overflow-y-auto p-4 chat-container flex flex-col max-w-4xl mx-auto w-full">

  </main>

  <footer class="p-4 bg-white border-t">
    <div class="max-w-4xl mx-auto flex gap-2">
      <input type="text" id="user-input" placeholder="Model is loading..." class="flex-1 p-3 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 disabled:bg-gray-100" disabled>
      <button id="send-btn" class="bg-blue-600 text-white px-6 py-2 rounded-lg font-medium hover:bg-blue-700 transition disabled:bg-gray-400" disabled>
        Send
      </button>
    </div>
  </footer>

  <script type="module">

    let linterInstance = null;

/**
 * Singleton to ensure we only boot the WebWorker and WASM once.
 */
async function getLinter() {
    if (linterInstance) return linterInstance;

    // harper.js is ESM, so dynamic import is required in CJS files
    const { WorkerLinter } = await import('harper.js');
    
    const linter = new WorkerLinter();
    await linter.setup();

    // Configuration optimized for N-gram sentence correction
    const config = await linter.getLintConfig();
    await linter.setLintConfig({
        ...config,
        SpellCheck: false,              // Catch typos in model output
        SentenceCapitalization: false, // N-grams often miss starting caps
        Matcher: true,                 // Use full grammar engine
        Correctness: true
    });

    linterInstance = linter;
    return linter;
}

/**
 * Corrects a single generated sentence.
 */
async function correctModelOutput(sentence) {
    const linter = await getLinter();
    const lints = await linter.lint(sentence);
    
    let corrected = sentence;
    // Sort backwards to preserve character indexes as we modify the string
    const sortedLints = lints.sort((a, b) => b.span.start - a.span.start);

    for (const lint of sortedLints) {
        if (lint.suggestions && lint.suggestions.length > 0) {
            // Apply the first (best) suggestion automatically
            corrected = await linter.applySuggestion(
                corrected, 
                lint, 
                lint.suggestions[0]
            );
        }
    }

    return corrected;
}

    const proxy = 'https://proxy.script-google-com.workers.dev/';
    const proxyFetch = async (url) => {
      const pURL = new URL(proxy);
      pURL.searchParams.set('url', url);
      const res = await fetch(String(pURL));
      return res;
    };
    const cap = x => [...String(x)].map((x, i) => (!i) ? x.toUpperCase() : x).join('');
    const Str = (x) => {
      try {
        return String(x);
      } catch (e) {
        console.warn(e);
        return String(e);
      }
    };

    const stringify = (x) => {
      try {
        return JSON.stringify(x);
      } catch (e) {
        console.warn(e, x);
        return Str(x);
      }
    };

    const unquote = x => String(x).replace(/^[\s"'`]+|[\s"'`]+$/g, '');

    const url =
      "https://script.google.com/macros/s/AKfycbzBFvLSewHPfKa0aemNWTO6PvXGhLzolyJkWlKVylPeCQNQIT3GoygE4k6pvTOYXoHC/exec";

    const fetchText = async (...args) => (await fetch(...args)).text();

    const canPing = async () => {
      try {
        const text = await fetchText(proxy + 'ping');
        console.log({
          text
        });
        return text === 'pong';
      } catch (e) {
        console.warn(e);
        return false;
      }
    };

    const langCache = {};
    const fixText = async function fixText(
      text,
      sourceLang = "fy",
      targetLang = "en",
    ) {
      if (!text?.trim?.()) {
        return text;
      }
      text = text.trim();
      let out;
      try {
        if (localStorage.getItem(text)) return localStorage.getItem(text);
        if (langCache[text]) return JSON.parse(await langCache[text]).textOut;
        const payload = {
          text
        };
        payload.sourceLang = sourceLang;
        payload.targetLang = targetLang;
        langCache[text] = fetchText(`${url}`, {
          method: "POST",
          body: encodeURIComponent(stringify(payload)),
        });
        const responsePayload = JSON.parse(await langCache[text]);
        out = responsePayload.textOut;
        //console.log({text},{responsePayload});
      } catch (e) {
        console.warn(e);
      }
      if (out?.trim?.() && out?.trim?.() !== "#ERROR!" && out != text) {
        localStorage.setItem(text, out);
      } else {
        delete langCache[text];
      }
      return out || text;
    };
    const fix = async (txt) => {
      if (!/[\?\!\.]$/.test(txt)) {
        txt = String(txt).trim() + '.';
      }
      /*txt = await fixText(txt, 'en', 'fr');
      txt = await fixText(txt, 'fr', 'en');*/
      return await correctModelOutput(txt);
    };
    const gasUrl = `https://script.google.com/macros/s/AKfycbyzgMVduwBNMiOiWL5iqrm7ixjfUU4ajWEt0tfZvFqLxOPXep9X9V41PFWuHdusLutx/exec`;

    async function fetchAllChunks(targetUrl) {
      const chunks = [];
      let chunk = 0;
      let contentType = "application/octet-stream";

      while (true) {
        const res = await fetch(
          `${gasUrl}?url=${encodeURIComponent(targetUrl)}&chunk=${chunk}`,
        );
        const body = await res.json();

        if (body.error) break; // throw new Error(body.error);

        if (body.contentType) contentType = body.contentType;

        // Decode base64 chunk to binary and collect as Uint8Array
        const binary = atob(body.data);
        const bytes = new Uint8Array(binary.length);
        for (let i = 0; i < binary.length; i++) {
          bytes[i] = binary.charCodeAt(i);
        }
        chunks.push(bytes);

        if (body.done) break;
        chunk++;
      }

      return new Blob(chunks, {
        type: contentType
      });
    }

const longestWord = (str) => {
  let longest = '';
  const words = String(str).split(/\s+/);
  for (const word of words) {
    if (word.length >= longest.length) {
      longest = word;
    }
  }
  return longest;
};

    function interleaveStrings(a, b) {
  const splitSentences = str =>
    str.match(/[^.!?]+[.!?]+[\s]*/g) ?? [str];

  const aSentences = splitSentences(a);
  const bSentences = splitSentences(b);
  const maxLen = Math.max(aSentences.length, bSentences.length);

  const interleaved = [];
  for (let i = 0; i < maxLen; i++) {
    if (i < aSentences.length) interleaved.push(aSentences[i]);
    if (i < bSentences.length) interleaved.push(bSentences[i]);
  }

  return interleaved.join('').trim();
}

    const unique = x => x ? [...new Set(x)] : [];
    
    let fetcher;
    async function fetchContext(str) {
      if (!fetcher) {
        if (await canPing()) {
          fetcher = proxyFetch;
        } else {
          fetcher = fetchAllChunks;
        }
      }
      str = unquote(str);
      let blurbs = [];
      let longblurbs = [];
      let longcontext = '';
      let blob = await fetcher(`https://en.wikipedia.org/wiki/${str}`);
      let text = await blob.text();
      let html = new DOMParser().parseFromString(text, "text/html");
      [...html.querySelectorAll('script,style,.mw-search-result-data,.searchResultImage-thumbnail')].forEach(x => x.remove());
      if (text.replace(/\s+/g, ' ').includes('Wikipedia does not have an article with this exact name') || !html.querySelector('#bodyContent .mw-content-ltr')) {
        let longblob = await fetcher(`https://en.wikipedia.org/wiki/${(longestWord(str).replace(/[^a-zA-Z]/g,''))}`);
        let longtext = await longblob.text();
        let longhtml = new DOMParser().parseFromString(longtext, "text/html");
        [...longhtml.querySelectorAll('script,style,.mw-search-result-data,.searchResultImage-thumbnail')].forEach(x => x.remove());
        longblurbs = [...longhtml.querySelectorAll('#bodyContent .mw-content-ltr :is(li,pi)')].map(x => String(x.textContent).replace(/\s+/g, ' ').replace(/[\!\?\.]+/g, '.').replaceAll('"', '').trim())
        .filter(x => !x.includes('tionary, the free dictionary'));
        longcontext = [...longhtml.querySelectorAll('#bodyContent ')].map(x => x?.textContent).join('. ').replace(/\.+/g, '.').trim();
      }
      if (text.replace(/\s+/g, ' ').includes('Wikipedia does not have an article with this exact name') || !html.querySelector('#bodyContent .mw-content-ltr')) {
        blob = await fetcher(`https://en.wikipedia.org/w/index.php?search=%22${encodeURIComponent(str)}%22&title=Special:Search&profile=advanced&fulltext=1&ns0=1`);
        text = await blob.text();
        html = new DOMParser().parseFromString(text, "text/html");
        [...html.querySelectorAll('script,style,.mw-search-result-data,.searchResultImage-thumbnail')].forEach(x => x.remove());
      }
      [...html.querySelectorAll('script,style,.mw-search-result-data,.searchResultImage-thumbnail')].forEach(x => x.remove());
      if (text.replace(/\s+/g, ' ').includes('no results matching the query') || !html.querySelector('.mw-search-results-container')) {
        blob = await fetcher(`https://en.wikipedia.org/w/index.php?search=${encodeURIComponent(str)}&title=Special:Search&profile=advanced&fulltext=1&ns0=1`);
        text = await blob.text();
        html = new DOMParser().parseFromString(text, "text/html");
        [...html.querySelectorAll('script,style,.mw-search-result-data,.searchResultImage-thumbnail')].forEach(x => x.remove());
      }
      if (text.replace(/\s+/g, ' ').includes('no results matching the query') || !html.querySelector('.mw-search-results-container')) {
        str = String(str).split(/\s+/).join(' OR ');
        blob = await fetcher(`https://en.wikipedia.org/w/index.php?search=${encodeURIComponent(str)}&title=Special:Search&profile=advanced&fulltext=1&ns0=1`);
        text = await blob.text();
        html = new DOMParser().parseFromString(text, "text/html");
        [...html.querySelectorAll('script,style,.mw-search-result-data,.searchResultImage-thumbnail')].forEach(x => x.remove());
      }
      if (['page does not exist', 'no results match the query'].some(x => html.firstElementChild.innerText.includes(x))) {
        blob = await fetcher(`https://www.wikidata.org/w/index.php?search=${encodeURIComponent(str)}&title=Special:Search&profile=advanced&fulltext=1&ns0=1`);
        text = await blob.text();
        html = new DOMParser().parseFromString(text, "text/html");
        [...html.querySelectorAll('script,style,.mw-search-result-data,.searchResultImage-thumbnail')].forEach(x => x.remove());
      }
      blurbs = [...html.querySelectorAll('li.mw-search-result,#mw-interwiki-results li')].map(x => String(x.textContent).replace(/\s+/g, ' ').replace(/[\!\?\.]+/g, '.').replaceAll('"', '').trim())
        .filter(x => !x.includes('tionary, the free dictionary'));
      if (!blurbs.length) {
        blurbs = [...html.querySelectorAll('#bodyContent .mw-content-ltr :is(li,pi)')].map(x => String(x.textContent).replace(/\s+/g, ' ').replace(/[\!\?\.]+/g, '.').replaceAll('"', '').trim())
        .filter(x => !x.includes('tionary, the free dictionary'));
      }
      blurbs = [...blurbs,...longblurbs];
      const sentenceBlurbs = blurbs.join('. ').split(/[\!\?\.]+/).map(x=>x.trim()).filter(Boolean);
      const phraseBlurbs = blurbs.join('. ').split(/[\!\?\.,;:]+/).map(x=>x.trim()).filter(Boolean);
      blurbs = unique([...blurbs,...sentenceBlurbs,...phraseBlurbs]);
      let context = [...html.querySelectorAll('.searchresult,#mw-interwiki-results li')].map(x => x?.textContent).join('. ').replace(/\.+/g, '.').trim();
      if (!context.length) {
        context = [...html.querySelectorAll('#bodyContent ')].map(x => x?.textContent).join('. ').replace(/\.+/g, '.').trim();
      }
      context = interleaveStrings(longcontext,context);
      context = context.slice(0, 2000) + '.';
      context = context.split('. ').map(cap).join('. ');
      // context = await fix(context);
      console.log({
        context
      });
      return Object.assign(new String(context), {
        blurbs
      });
    }

    const chatWindow = document.getElementById('chat-window');
    const userInput = document.getElementById('user-input');
    const sendBtn = document.getElementById('send-btn');
    const statusEl = document.getElementById('status');
    const activityIndicator = document.getElementById('activity-indicator');

    function addMessage(text, isUser = false) {
      const msgDiv = document.createElement('div');
      msgDiv.className = `message ${isUser ? 'user-msg' : 'bot-msg'}`;
      msgDiv.innerText = text;
      chatWindow.appendChild(msgDiv);
      chatWindow.scrollTop = chatWindow.scrollHeight;
      return msgDiv;
    }

    let currentLoadingMsg = null;

    function handleError(payload) {
      console.warn(payload);
      statusEl.innerText = "Worker Error";
      statusEl.className = "text-xs text-red-500 font-medium";
      addMessage("Error: " + payload);
      activityIndicator.classList.replace('bg-green-500', 'bg-red-500');
    };
    let worker = {};
    try {
      worker = new Worker('model-worker.js');
    } catch (err) {
      handleError(err);
    }
    worker.onerror = handleError;

    // --- Worker Communication ---
    worker.onmessage = async (e) => {
      const {
        type,
        payload,
        source
      } = e.data;

      switch (type) {
        case 'READY':
          statusEl.innerText = "Model Ready";
          statusEl.className = "text-xs text-green-500 font-medium";
          activityIndicator.classList.replace('bg-gray-300', 'bg-green-500');
          userInput.disabled = false;
          userInput.placeholder = "Ask something...";
          sendBtn.disabled = false;
          addMessage("Model loaded");
          break;

        case 'ANSWER':
          if (currentLoadingMsg) {
            currentLoadingMsg.innerHTML = (await fix(payload)).replace(/[\(\)]/g,'') + `<sup>${source}</sup>`;
            currentLoadingMsg.classList.remove('loading-dots');
            currentLoadingMsg = null;
          }
          activityIndicator.classList.remove('animate-pulse');
          break;

        case 'ERROR':
          handleError(payload);
          break;
      }
      globalThis.sendInProgress = false;
    };

    async function handleSend() {
      try {
        const question = userInput.value.trim();

        if (globalThis.sendInProgress || !question) return;

        globalThis.sendInProgress = true;
        addMessage(question, true);
        userInput.value = '';

        currentLoadingMsg = addMessage("Thinking", false);
        currentLoadingMsg.classList.add('loading-dots');

        activityIndicator.classList.add('animate-pulse');

        let contextPassage = await fetchContext(question);
        const norm = (str) => String(str).normalize("NFD").replace(/[\u0300-\u036f]/g, "");
        const processedContext = contextPassage; //+ '\n' + norm(contextPassage);

        // Send to worker
        worker.postMessage({
          type: 'ASK',
          payload: {
            question,
            context: processedContext,
            blurbs: processedContext.blurbs
          }
        });
      } catch (e) {
        console.warn(e);
        addMessage("Error: " + e);
      }
    }

    sendBtn.addEventListener('click', handleSend);
    userInput.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') handleSend();
    });

    // Initialize Worker
    worker.postMessage({
      type: 'INIT'
    });

  </script>
</body>

</html>
